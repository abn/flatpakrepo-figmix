name: Publish Flatpak

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Publish com.odnoyko.figmix
    uses: aetherpak/actions/.github/workflows/publish.yml@v2
    with:
      manifest-path: apps/com.odnoyko.figmix/com.odnoyko.figmix.json
      runtime: freedesktop-25.08
      branch: stable
      arches: x86_64
      submodules: recursive
      run-linter: false

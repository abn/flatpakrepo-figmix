name: Publish Flatpak

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reconcile-only:
        description: Skip build/publish-oci; only reconcile the index against the registry and re-deploy.
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Publish com.odnoyko.figmix
    uses: aetherpak/actions/.github/workflows/publish.yml@v3
    with:
      manifest-path: apps/com.odnoyko.figmix/com.odnoyko.figmix.json
      branch: stable
      arches: x86_64
      submodules: recursive
      run-linter: false
      reconcile-only: ${{ inputs.reconcile-only || false }}
